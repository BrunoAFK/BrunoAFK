name: Rotate Banner Quote

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 6:00 UTC
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate random banner SVG
        run: |
          python3 << 'PYEOF'
          import random

          quotes = [
            ("if I do it twice, I automate it.",          "if I do it once... I still automate it."),
            ("the goal is not to work less.",              "the goal is to never do the same thing twice."),
            ("the best runbook is the one",                "that runs itself."),
            ("know your why.",                             ""),
            ("humans are for decisions.",                  "machines are for everything else."),
            ("complexity is easy. reliability is hard.",   "automation is how you get both."),
            ("why do today what a cron job can do at 3am?", ""),
            ("it's not laziness.",                         "it's efficiency with extra steps."),
            ("I don't have hobbies.",                      "I have side projects with dashboards."),
            ("the only acceptable alert",                  "is the one that fixes itself."),
            ("works on my proxmox.",                       ""),
          ]

          line1, line2 = random.choice(quotes)

          svg = f'''<svg width="640" height="100" viewBox="0 0 640 100" xmlns="http://www.w3.org/2000/svg">
            <rect width="640" height="100" fill="#0d1117" rx="6"/>
            <rect x="1" y="1" width="638" height="98" fill="none" stroke="#30363d" stroke-width="1" rx="6"/>
            <text x="320" y="38" font-family="monospace" font-size="14" fill="#e6edf3" text-anchor="middle">{line1}</text>
            <text x="320" y="62" font-family="monospace" font-size="14" fill="#7d8590" text-anchor="middle">{line2}</text>
          </svg>'''

          import os
          os.makedirs("assets", exist_ok=True)
          with open("assets/banner.svg", "w") as f:
              f.write(svg)

          print(f"Selected: {line1}")
          PYEOF

      - name: Commit updated banner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/banner.svg
          git diff --staged --quiet || git commit -m "chore: rotate banner quote"
          git push
